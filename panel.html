<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Graph Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        #sidebar {
            width: 100vw;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
        }
        .graph {
            overflow: hidden;
            height: 100%;
        }
        svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        svg text {
            user-select: none;
            pointer-events: none;
        }
        .tooltip {
            position: absolute;
            background: #fff;
            border: 1px solid #aaa;
            padding: 5px 8px;
            font-size: 14px;
            white-space: pre-wrap;
            display: none;
            z-index: 1000;
            max-width: 400px;
            pointer-events: none;
        }
        .main {
            width: 50vw;
        }
        center {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
    </style>
    <script src="./viz.js" type="application/javascript"></script>
    <script src="./full.render.js" type="application/javascript"></script>
</head>
<body>
    <div id="sidebar">
        <button id="record">Start</button>
        <span id="recv">0</span><span style="color:red;">↓</span> / <span id="sent">0</span><span style="color:green;">↑</span>
    </div>
    <div style="display: flex; height: 100%;">
        <div class="main">
            <center>SEND</center>
            <div class="graph"></div>
            <div class="tooltip"></div>
        </div>
        <div class="main" style="border-left: 1px solid #ccc;">
            <center>RECV</center>
            <div class="graph"></div>
            <div class="tooltip"></div>
        </div>
    </div>
    <script src="panel.js"></script>
</body>
</html>
